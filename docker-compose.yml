services:
 # ── Services créés  ──────────────────────────────────────
  ingestion:
      build:
        context: .           # racine du projet
        dockerfile: services/ingestion/Dockerfile
      container_name: ingestion
      env_file:
        - .env
      depends_on:
        mongodb:
          condition: service_started
        elasticsearch:
          condition: service_healthy
      networks:
        - job-market-backend-portfolio
      environment:
        - MONGO_HOST=mongodb
        - ELASTIC_HOST=elasticsearch
        - POSTGRES_HOST=postgresql

  ml:
      build:
        context: .           # racine du projet
        dockerfile: services/ml/Dockerfile
      container_name: ml
      env_file:
        - .env
      volumes:
        - ml_models:/app/services/ml/models
      depends_on:
        ingestion:
          condition: service_started
        mongodb:
          condition: service_started
      networks:
        - job-market-backend-portfolio
      environment:
        - MONGO_HOST=mongodb
        - ELASTIC_HOST=elasticsearch

  api:
      build:
        context: .           # racine du projet
        dockerfile: services/api/Dockerfile
      container_name: api
      env_file:
        - .env
      ports:
        - "${API_PORT}:8000"
      volumes:
        - ml_models:/app/services/ml/models
      depends_on:
        ml:
          condition: service_completed_successfully
        mongodb:
          condition: service_started
        elasticsearch:
          condition: service_healthy
      networks:
        - job-market-backend-portfolio
        - job-market-frontend-portfolio
      environment:
        - MONGO_HOST=mongodb
        - ELASTIC_HOST=elasticsearch
        - POSTGRES_HOST=postgresql

  frontend:
        build:
          context: .
          dockerfile: services/frontend/Dockerfile
        container_name: frontend
        env_file:
          - .env
        ports:
          - "${FRONTEND_PORT:-8501}:8501"
        depends_on:
          api:
            condition: service_started
        networks:
          - job-market-backend-portfolio
          - job-market-frontend-portfolio
        environment:
          - API_URL=http://api:8000
        restart: unless-stopped


# ── Airflow ───────────────────────────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: airflow-init
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      - PYTHONPATH=/app
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs/airflow:/opt/airflow/logs
      - .:/app
    networks:
      - job-market-backend-portfolio
    depends_on:
      postgresql:
        condition: service_started
    entrypoint: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true"
    restart: "no"

  airflow-scheduler:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: airflow-scheduler
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      - PYTHONPATH=/app
      - MONGO_HOST=mongodb
      - ELASTIC_HOST=elasticsearch
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - FRANCETRAVAIL_CLIENT_ID=${FRANCETRAVAIL_CLIENT_ID}
      - FRANCETRAVAIL_CLIENT_SECRET=${FRANCETRAVAIL_CLIENT_SECRET}
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs/airflow:/opt/airflow/logs
      - .:/app
    networks:
      - job-market-backend-portfolio
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      postgresql:
        condition: service_started
    command: scheduler
    user: "0:0"
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: airflow-webserver
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs/airflow:/opt/airflow/logs
    ports:
      - "8080:8080"
    networks:
      - job-market-backend-portfolio
      - job-market-frontend-portfolio
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    restart: unless-stopped

 # ── Bases de données ──────────────────────────────────────
  postgresql:
    image: postgres:16
    container_name: my_postgres_job_market
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - job-market-backend-portfolio
    restart: unless-stopped

  mongodb:
    image: mongo:8.0
    container_name: my_mongo_job_market
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - 27017:27017
    networks:
      - job-market-backend-portfolio
    restart: unless-stopped

  elasticsearch:
    container_name: es-container
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - xpack.security.enabled=false
      - "discovery.type=single-node"
      - ES_JAVA_OPTS=-Xms512m -Xmx512m   # ← limite la RAM utilisée
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    networks:
      - job-market-backend-portfolio
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s


# ── Interfaces d'administration ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: my_pgadmin_job_market
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - job-market-backend-portfolio    # ← doit voir postgresql
      - job-market-frontend-portfolio   # ← accessible depuis navigateur
    depends_on:
      - postgresql
    restart: unless-stopped

  kibana:
    container_name: kb-container
    image: docker.elastic.co/kibana/kibana:8.17.0
    environment:
      - ELASTICSEARCH_HOSTS=http://es-container:9200
    ports:
      - 5601:5601
    networks:
      - job-market-backend-portfolio   # ← doit voir elasticsearch
      - job-market-frontend-portfolio   # ← accessible depuis navigateur
    depends_on:
      - elasticsearch
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:
  mongo_data:
  elastic_data:
  ml_models:
  airflow_logs:


# ── Réseaux ───────────────────────────────────────────────────
networks:
  job-market-backend-portfolio:
    driver: bridge
    name: job-market-backend-portfolio

  job-market-frontend-portfolio:
    driver: bridge
    name: job-market-frontend-portfolio
